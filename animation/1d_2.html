<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎵 Music Playlist - Array Example</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .playlist {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin: 30px 0;
    }

    .song-box {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      width: 150px;
      height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border: 2px solid #444;
      transition: all 0.3s;
    }

    .song-box:hover {
      border-color: #1db954;
      background-color: #1db95420;
      cursor: pointer;
    }

    .controls {
      margin-top: 20px;
    }

    input[type="text"] {
      padding: 10px;
      border-radius: 5px;
      border: none;
      margin-right: 10px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      background-color: #1db954;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .highlight {
      border-color: yellow !important;
      background-color: #ffff0055;
    }
  </style>
</head>
<body>
  <h1>🎵 My Playlist (1D Array Example)</h1>

  <div class="controls">
    <input type="text" id="songInput" placeholder="Enter song name" />
    <button onclick="addSong()">Add Song</button>
  </div>

  <div class="playlist" id="playlist"></div>

  <script>
    const songs = []; // 1D array
    const playlistDiv = document.getElementById("playlist");

    function addSong() {
      const input = document.getElementById("songInput");
      const song = input.value.trim();
      if (song === "") return;
      songs.push(song);
      input.value = "";
      renderPlaylist();
    }

    function renderPlaylist() {
      playlistDiv.innerHTML = "";
      songs.forEach((song, index) => {
        const songDiv = document.createElement("div");
        songDiv.className = "song-box";
        songDiv.innerHTML = `<strong>${song}</strong><br/><small>Index: ${index}</small>`;
        songDiv.onclick = () => highlight(index);
        playlistDiv.appendChild(songDiv);
      });
    }

    function highlight(index) {
      const boxes = document.querySelectorAll(".song-box");
      boxes.forEach(box => box.classList.remove("highlight"));
      boxes[index].classList.add("highlight");
      alert(`Playing song at index ${index}: ${songs[index]}`);
    }
  </script>
</body>
</html>
