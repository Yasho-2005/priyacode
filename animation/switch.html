<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Traffic Light - switch statement</title>
  <style>
    body {
      background-color: #121212;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
    }

    h1 {
      margin-bottom: 30px;
    }

    .traffic-light {
      background-color: #333;
      width: 100px;
      margin: auto;
      padding: 20px;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .light {
      width: 50px;
      height: 50px;
      background-color: #555;
      border-radius: 50%;
      box-shadow: 0 0 5px #000;
      transition: background-color 0.3s, box-shadow 0.3s;
    }

    .on-red {
      background-color: red;
      box-shadow: 0 0 15px red;
    }

    .on-yellow {
      background-color: yellow;
      box-shadow: 0 0 15px yellow;
    }

    .on-green {
      background-color: limegreen;
      box-shadow: 0 0 15px limegreen;
    }

    .buttons {
      margin: 20px 0;
    }

    .buttons button {
      padding: 10px 15px;
      margin: 0 10px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .code-box {
      background-color: #2c2c2c;
      padding: 20px;
      border-radius: 10px;
      font-size: 16px;
      width: 400px;
      white-space: pre-wrap;
      text-align: left;
      margin: auto;
    }

    .highlight {
      background-color: yellow;
      color: black;
      padding: 2px 4px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <h1>Traffic Light using <code>switch</code> Statement</h1>

  <!-- Traffic Light -->
  <div class="traffic-light">
    <div id="red" class="light"></div>
    <div id="yellow" class="light"></div>
    <div id="green" class="light"></div>
  </div>

  <!-- Buttons -->
  <div class="buttons">
    <button onclick="selectLight('green')">Green</button>
    <button onclick="selectLight('yellow')">Yellow</button>
    <button onclick="selectLight('red')">Red</button>
  </div>

  <!-- Code display -->
  <div class="code-box">
<code>
#include &lt;stdio.h&gt;
#include &lt;string.h&gt;

int main() {
    char color[] = "green";

    switch (color[0]) {
        <span id="caseGreen">case 'g':
            printf("Go");
            break;</span>
        <span id="caseYellow">case 'y':
            printf("Slow Down");
            break;</span>
        <span id="caseRed">case 'r':
            printf("Stop");
            break;</span>
        default:
            printf("Invalid color");
    }

    return 0;
}
</code>
  </div>

  <script>
    const lights = {
      red: document.getElementById("red"),
      yellow: document.getElementById("yellow"),
      green: document.getElementById("green")
    };

    const caseGreen = document.getElementById("caseGreen");
    const caseYellow = document.getElementById("caseYellow");
    const caseRed = document.getElementById("caseRed");

    function selectLight(color) {
      // Turn off all lights
      for (let key in lights) {
        lights[key].classList.remove("on-red", "on-yellow", "on-green");
      }

      // Reset code highlights
      caseGreen.classList.remove("highlight");
      caseYellow.classList.remove("highlight");
      caseRed.classList.remove("highlight");

      // Turn on selected light and highlight case
      if (color === "green") {
        lights.green.classList.add("on-green");
        caseGreen.classList.add("highlight");
      } else if (color === "yellow") {
        lights.yellow.classList.add("on-yellow");
        caseYellow.classList.add("highlight");
      } else if (color === "red") {
        lights.red.classList.add("on-red");
        caseRed.classList.add("highlight");
      }
    }
  </script>

</body>
</html>
