<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>1D Array - Enter Marks</title>
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .score-boxes {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 20px 0;
    }

    .score {
      width: 60px;
      height: 60px;
      background-color: #333;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: background-color 0.3s;
    }

    .score.highlight {
      background-color: yellow;
      color: black;
      font-weight: bold;
    }

    input {
      padding: 10px;
      font-size: 16px;
      width: 100px;
      border-radius: 6px;
      border: none;
      margin-right: 10px;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      background-color: #444;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #666;
    }

    .code-box {
      background-color: #222;
      padding: 20px;
      border-radius: 10px;
      margin-top: 40px;
      max-width: 500px;
      margin-inline: auto;
      text-align: left;
      white-space: pre-wrap;
      font-size: 15px;
    }

    .code-highlight {
      background-color: yellow;
      color: black;
      padding: 2px 4px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <h1>📥 Enter Marks - 1D Array</h1>

  <div>
    <input type="number" id="markInput" placeholder="Enter mark">
    <button onclick="addMark()">Add</button>
    <button onclick="resetMarks()">Reset</button>
  </div>

  <div class="score-boxes" id="scoreBoxes">
    <div class="score">-</div>
    <div class="score">-</div>
    <div class="score">-</div>
    <div class="score">-</div>
    <div class="score">-</div>
  </div>

  <div class="code-box">
<code>
#include &lt;stdio.h&gt;

int main() {
    int marks[5];
    int i;

    <span id="codeLoop">for(i = 0; i &lt; 5; i++) {</span>
        <span id="codeInput">scanf("%d", &marks[i]);</span>
    }

    return 0;
}
</code>
  </div>

  <script>
    const boxes = document.querySelectorAll(".score");
    const input = document.getElementById("markInput");
    const loop = document.getElementById("codeLoop");
    const scan = document.getElementById("codeInput");

    const marks = [];
    let index = 0;

    function addMark() {
      const value = input.value.trim();
      if (value === "" || isNaN(value)) {
        alert("Please enter a valid number");
        return;
      }

      if (index >= 5) {
        alert("Array is full!");
        return;
      }

      marks[index] = Number(value);
      boxes[index].textContent = value;
      boxes[index].classList.add("highlight");

      loop.classList.add("code-highlight");
      scan.classList.add("code-highlight");

      setTimeout(() => {
        boxes[index].classList.remove("highlight");
        loop.classList.remove("code-highlight");
        scan.classList.remove("code-highlight");
        input.value = "";
        index++;
      }, 600);
    }

    function resetMarks() {
      index = 0;
      marks.length = 0;
      boxes.forEach(box => {
        box.textContent = "-";
        box.classList.remove("highlight");
      });
      input.value = "";
      loop.classList.remove("code-highlight");
      scan.classList.remove("code-highlight");
    }
  </script>

</body>
</html>
