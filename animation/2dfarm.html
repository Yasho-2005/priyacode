<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nested Loop - Planting Farm</title>
  <style>
    body {
      background: #1a1a1a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 30px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      gap: 10px;
      justify-content: center;
      margin: 20px auto;
    }

    .cell {
      width: 80px;
      height: 80px;
      background: #444;
      font-size: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 10px;
    }

    .code-box {
      background-color: #2c2c2c;
      padding: 20px;
      border-radius: 10px;
      font-size: 16px;
      white-space: pre-wrap;
      text-align: left;
      max-width: 500px;
      margin: auto;
    }

    .highlight {
      background-color: yellow;
      color: black;
      padding: 2px 4px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <h1>🌾 Nested Loop Example - Farm Planting</h1>
  <button onclick="startPlanting()">Start Planting</button>

  <div class="grid" id="farmGrid">
    <!-- 3x3 grid -->
    <div class="cell" id="cell-0-0"></div>
    <div class="cell" id="cell-0-1"></div>
    <div class="cell" id="cell-0-2"></div>
    <div class="cell" id="cell-1-0"></div>
    <div class="cell" id="cell-1-1"></div>
    <div class="cell" id="cell-1-2"></div>
    <div class="cell" id="cell-2-0"></div>
    <div class="cell" id="cell-2-1"></div>
    <div class="cell" id="cell-2-2"></div>
  </div>

  <div class="code-box">
<code>
<span id="loop1">for(int i = 0; i &lt; 3; i++) {</span><br>
  <span id="loop2"> for(int j = 0; j &lt; 3; j++) {</span><br>
  <span id="print">  printf("🌽 ");</span><br>
  <span> }</span><br>
<span>}</span>
</code>
  </div>

  <script>
    async function startPlanting() {
      const loop1 = document.getElementById("loop1");
      const loop2 = document.getElementById("loop2");
      const print = document.getElementById("print");

      // Reset
      for (let i = 0; i < 3; i++) {
        for (let j = 0; j < 3; j++) {
          document.getElementById(`cell-${i}-${j}`).textContent = "";
        }
      }

      for (let i = 0; i < 3; i++) {
        loop1.classList.add("highlight");
        await sleep(500);
        for (let j = 0; j < 3; j++) {
          loop2.classList.add("highlight");
          print.classList.add("highlight");

          document.getElementById(`cell-${i}-${j}`).textContent = "🌽";

          await sleep(500);

          loop2.classList.remove("highlight");
          print.classList.remove("highlight");
        }
        loop1.classList.remove("highlight");
      }
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
  </script>
</body>
</html>
