<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Continue Statement - Fruit Washer</title>
  <style>
    body {
      background-color: #181818;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background-color: #444;
      color: white;
      cursor: pointer;
      margin-bottom: 20px;
    }

    button:hover {
      background-color: #666;
    }

    .fruits {
      font-size: 40px;
      margin: 20px 0;
      min-height: 60px;
    }

    .code-box {
      background-color: #2c2c2c;
      padding: 20px;
      border-radius: 10px;
      font-size: 16px;
      white-space: pre-wrap;
      text-align: left;
      max-width: 450px;
      margin: auto;
    }

    .highlight {
      background-color: yellow;
      color: black;
      padding: 2px 4px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <h1>🍎 Fruit Washer using <code>continue</code></h1>

  <button onclick="washFruits()">Start Washing Fruits</button>

  <div class="fruits" id="fruitOutput">🙂</div>

  <div class="code-box">
<code>
#include &lt;stdio.h&gt;

int main() {
    char fruits[] = {'🍎', '🍌', '🚫', '🍊', '🍇'};
    int i;

    <span id="loop">for(i = 0; i &lt; 5; i++) {</span>
        <span id="condition">if(fruits[i] == '🚫') {
            continue;
        }</span>
        <span id="print">printf("%c ", fruits[i]);</span>
    }

    return 0;
}
</code>
  </div>

  <script>
    const output = document.getElementById("fruitOutput");
    const loop = document.getElementById("loop");
    const condition = document.getElementById("condition");
    const print = document.getElementById("print");

    function washFruits() {
      const fruits = ['🍎', '🍌', '🚫', '🍊', '🍇'];
      let i = 0;
      output.textContent = "";

      // Clear previous highlights
      [loop, condition, print].forEach(el => el.classList.remove("highlight"));

      const interval = setInterval(() => {
        if (i >= fruits.length) {
          clearInterval(interval);
          [loop, condition, print].forEach(el => el.classList.remove("highlight"));
          return;
        }

        // Step 1: highlight loop
        [loop, condition, print].forEach(el => el.classList.remove("highlight"));
        loop.classList.add("highlight");

        setTimeout(() => {
          // Step 2: highlight condition
          loop.classList.remove("highlight");
          condition.classList.add("highlight");

          setTimeout(() => {
            if (fruits[i] === '🚫') {
              output.textContent += "❌(Skip Rotten) ";
              condition.classList.remove("highlight");
              i++;
              return;
            }

            // Step 3: print and highlight printf
            condition.classList.remove("highlight");
            print.classList.add("highlight");

            setTimeout(() => {
              output.textContent += fruits[i] + " ";
              print.classList.remove("highlight");
              i++;
            }, 400);

          }, 400);

        }, 400);
      }, 1300);
    }
  </script>

</body>
</html>
