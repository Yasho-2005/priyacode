<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For Loop - Planting Trees</title>
  <style>
    body {
      background: #1a1a1a;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .garden {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .tree {
      font-size: 40px;
      transition: transform 0.3s;
    }

    .planted {
      transform: scale(1.5);
      color: lightgreen;
    }

    button {
      font-size: 20px;
      padding: 10px 20px;
      background: #444;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
      margin-bottom: 20px;
    }

    button:hover {
      background: #666;
    }

    .code-box {
      background-color: #2c2c2c;
      padding: 20px;
      border-radius: 10px;
      font-size: 16px;
      white-space: pre-wrap;
      text-align: left;
      max-width: 400px;
      margin: auto;
    }

    .highlight {
      background-color: yellow;
      color: black;
      padding: 2px 4px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <h1>🌱 Planting Trees with <code>for</code> Loop</h1>

  <button onclick="plantTrees()">Plant Trees</button>

  <div class="garden">
    <span class="tree" id="tree0">🪴</span>
    <span class="tree" id="tree1">🪴</span>
    <span class="tree" id="tree2">🪴</span>
    <span class="tree" id="tree3">🪴</span>
    <span class="tree" id="tree4">🪴</span>
  </div>

  <div class="code-box">
<code>
#include &lt;stdio.h&gt;

int main() {
    int i;
    <span id="forCode">for(i = 0; i &lt; 5; i++) {
        printf("Tree %d planted!\\n", i);
    }</span>
    return 0;
}
</code>
  </div>

  <script>
    const trees = [...document.querySelectorAll('.tree')];
    const forCode = document.getElementById("forCode");

    function plantTrees() {
      forCode.classList.add("highlight");

      trees.forEach((tree) => tree.classList.remove("planted"));
      let i = 0;

      const interval = setInterval(() => {
        if (i < trees.length) {
          trees[i].classList.add("planted");
          i++;
        } else {
          clearInterval(interval);
          setTimeout(() => forCode.classList.remove("highlight"), 500);
        }
      }, 500);
    }
  </script>

</body>
</html>
