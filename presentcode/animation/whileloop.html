<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>While Loop - Fill Bottle</title>
  <style>
    body {
      background: #1a1a1a;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 30px;
    }

    .bottle {
      width: 100px;
      height: 300px;
      border: 3px solid #00bfff;
      margin: 20px auto;
      position: relative;
      border-radius: 10px;
      overflow: hidden;
    }

    .fill {
      background: #00bfff;
      width: 100%;
      position: absolute;
      bottom: 0;
      transition: height 0.4s;
    }

    .button {
      padding: 12px 24px;
      font-size: 16px;
      background: #444;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .button:hover {
      background: #666;
    }

    .code-box {
      background-color: #2c2c2c;
      padding: 20px;
      border-radius: 10px;
      font-size: 16px;
      white-space: pre-wrap;
      text-align: left;
      margin: 20px auto;
      max-width: 400px;
    }

    .highlight {
      background-color: yellow;
      color: black;
      padding: 2px 4px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <h1>💧 Fill the Bottle using <code>while</code> Loop</h1>

  <div class="bottle">
    <div class="fill" id="waterFill" style="height: 0%"></div>
  </div>

  <button class="button" onclick="fillWater()">Fill Water</button>

  <div class="code-box">
<code>
#include &lt;stdio.h&gt;

int main() {
    int waterLevel = 0;

    <span id="whileBlock">while (waterLevel &lt; 5) {
        printf("Filling...\\n");
        waterLevel++;
    }</span>

    return 0;
}
</code>
  </div>

  <script>
    let waterLevel = 0;
    const fillDiv = document.getElementById("waterFill");
    const whileBlock = document.getElementById("whileBlock");

    function fillWater() {
      if (waterLevel < 5) {
        whileBlock.classList.add("highlight");
        waterLevel++;
        fillDiv.style.height = `${waterLevel * 20}%`;
        if (waterLevel === 5) {
          setTimeout(() => {
            alert("✅ Bottle is full!");
            whileBlock.classList.remove("highlight");
          }, 400);
        }
      } else {
        alert("Bottle is already full!");
        whileBlock.classList.remove("highlight");
      }
    }
  </script>

</body>
</html>
