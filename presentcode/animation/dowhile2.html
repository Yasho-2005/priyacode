<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>do-while Loop - Jumping Jacks</title>
  <style>
    body {
      background-color: #121212;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      background-color: #2d2d2d;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 18px;
      border-radius: 8px;
      margin: 10px;
      cursor: pointer;
    }

    .output {
      font-size: 50px;
      margin: 20px auto;
      height: 70px;
    }

    .code-box {
      background-color: #1f1f1f;
      padding: 20px;
      border-radius: 10px;
      text-align: left;
      margin: 30px auto;
      max-width: 500px;
      font-size: 16px;
      white-space: pre-wrap;
    }

    .highlight {
      background-color: yellow;
      color: black;
      padding: 2px 4px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <h1>🤸 Jumping Jack Counter (do-while)</h1>
  <button onclick="startJumping()">Start Exercise</button>

  <div class="output" id="exerciseOutput">🧍</div>

  <div class="code-box">
<code>
#include &lt;stdio.h&gt;

int main() {
    int count = 1;
    <span id="doPart">do {
        printf("Jumping Jack %d\n", count);
        count++;</span>
    <span id="whilePart">} while(count <= 5);</span>
    return 0;
}
</code>
  </div>

  <script>
    const output = document.getElementById("exerciseOutput");
    const doPart = document.getElementById("doPart");
    const whilePart = document.getElementById("whilePart");
  
    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
  
    async function startJumping() {
      let count = 1;
      output.textContent = "🤸‍♀️ Jump 1";
      doPart.classList.add("highlight");
      whilePart.classList.remove("highlight");
  
      do {
        // Show jump
        output.textContent = `🤸‍♀️ Jump ${count}`;
        await sleep(600);
  
        // Simulate condition check before next jump
        count++;
        doPart.classList.remove("highlight");
        whilePart.classList.add("highlight");
        await sleep(400);
  
        if (count <= 5) {
          whilePart.classList.remove("highlight");
          doPart.classList.add("highlight");
        }
  
      } while (count <= 5);
  
      output.textContent = "✅ Done!";
      whilePart.classList.add("highlight");
      doPart.classList.remove("highlight");
    }
  </script>
  

</body>
</html>
